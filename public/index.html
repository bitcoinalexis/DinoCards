<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dino Bey - Card Battle</title>
  <link rel="stylesheet" href="css/style.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <canvas id="scene"></canvas>

  <div id="ui" class="ui">
    <header class="brand">
      <h1 class="title">DINO BEY</h1>
      <p class="subtitle">Card Battle</p>
    </header>

    <nav class="menu" id="mainMenu">
      <button class="btn btn-primary" data-action="play">MULTIJUGADOR</button>
      <button class="btn" data-action="vsAI">VS IA</button>
      <button class="btn" data-action="howto">CÓMO JUGAR</button>
      <button class="btn" data-action="credits">CRÉDITOS</button>
    </nav>

    <div class="panel hidden" id="difficultyPanel">
      <h2>Elige dificultad</h2>
      <div class="diff-options">
        <button class="btn" data-action="startAI" data-diff="facil">FÁCIL</button>
        <button class="btn" data-action="startAI" data-diff="normal">NORMAL</button>
        <button class="btn" data-action="startAI" data-diff="dificil">DIFÍCIL</button>
      </div>
      <button class="btn btn-ghost" data-action="back">VOLVER</button>
    </div>

    <div class="panel hidden" id="searchPanel">
      <div class="spinner"></div>
      <p class="panel-text" id="searchText">Buscando oponente...</p>
      <button class="btn btn-ghost" data-action="cancel">CANCELAR</button>
    </div>

    <div class="panel hidden" id="infoPanel">
      <h2 id="infoTitle">Título</h2>
      <p id="infoBody">Contenido</p>
      <button class="btn btn-ghost" data-action="back">VOLVER</button>
    </div>

    <footer class="status" id="status">Conectando...</footer>
  </div>

  <div id="gameUI" class="game-ui hidden">
    <div class="scoreboard">
      <div class="score-card you">
        <span class="score-name">TÚ</span>
        <span class="score-pairs" id="scoreYou">0</span>
      </div>
      <div class="score-mid">
        <span class="score-target" id="scoreTarget">Pares para ganar: 4</span>
        <span class="score-vs">VS</span>
      </div>
      <div class="score-card opp">
        <span class="score-name" id="oppName">RIVAL</span>
        <span class="score-pairs" id="scoreOpp">0</span>
      </div>
    </div>

    <div class="toast hidden" id="toast"></div>

    <button class="take-btn" id="takeBtn" data-action="take">TOMAR</button>
  </div>

  <div id="countdown" class="countdown hidden"><span id="countNum">3</span></div>

  <div id="resultScreen" class="result hidden">
    <h2 id="resultTitle">Resultado</h2>
    <p id="resultDetail"></p>
    <div class="result-actions">
      <button class="btn btn-primary" data-action="rematch">BUSCAR OTRA</button>
      <button class="btn btn-ghost" data-action="toMenu">MENÚ</button>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
